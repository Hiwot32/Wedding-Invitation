<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Wedding</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body style="background: linear-gradient(to right, #f8f9fa, #ffe6f0)">

<div class="container py-5">

  <!-- Page Title -->
  <div class="text-center mb-5">
    <h1 style="font-family: cursive; color: #c2185b;">
      ✏ Edit Wedding Information
    </h1>
    <p class="text-muted">Update your wedding details below</p>
  </div>

  <div class="card shadow-lg border-0" style="border-radius:20px;">
    <div class="card-body p-5">

      <!-- FORM -->
      <form method="POST" action="{% url 'edit_wedding' %}" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- BASIC INFO -->
        <h4 class="mb-4" style="color:#c2185b;">Basic Information</h4>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Bride Name</label>
            <input type="text" name="bride_name"
              class="form-control"
              value="{{ wedding.bride_name }}"
              required>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Groom Name</label>
            <input type="text" name="groom_name"
              class="form-control"
              value="{{ wedding.groom_name }}"
              required>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Wedding Date</label>
            <input type="date" name="wedding_date"
              class="form-control"
              value="{{ wedding.wedding_date|date:'Y-m-d' }}">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Location</label>
            <input type="text" name="location"
              class="form-control"
              value="{{ wedding.location }}">
          </div>
        </div>

        <hr class="my-4">

        <!-- STORY -->
        <h4 class="mb-4" style="color:#c2185b;">Our Love Story</h4>

        <div class="mb-3">
          <label class="form-label fw-bold">Our Story</label>
          <textarea name="story" class="form-control" rows="3">{{ wedding.story }}</textarea>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">How We Met</label>
          <textarea name="how_we_met" class="form-control" rows="3">{{ wedding.how_we_met }}</textarea>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">First Date</label>
          <textarea name="first_date" class="form-control" rows="3">{{ wedding.first_date }}</textarea>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Proposal</label>
          <textarea name="proposal" class="form-control" rows="3">{{ wedding.proposal }}</textarea>
        </div>

        <hr class="my-4">

        <!-- UPDATE BUTTON -->
        <div class="text-center mt-4">
          <button type="submit"
            class="btn px-5 py-2"
            style="
              background-color:#c2185b;
              color:white;
              border-radius:30px;
              font-weight:bold;">
            💾 Update Wedding
          </button>

          <a href="{% url 'Info' %}"
             class="btn btn-secondary px-4 py-2 ms-3"
             style="border-radius:30px;">
            Cancel
          </a>
        </div>

      </form>
    </div>
  </div>

</div>

</body>
</html>
