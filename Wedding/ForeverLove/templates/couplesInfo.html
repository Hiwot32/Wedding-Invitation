<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Couples Information</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body style="background: linear-gradient(to right, #f8f9fa, #ffe6f0)">
    <div class="container py-5">
      <!-- Page Title -->
      <div class="text-center mb-5">
        <h1 style="font-family: cursive; color: #c2185b">
          💕 Couples Information
        </h1>
        <p class="text-muted">Create or Update Your Wedding Story</p>
      </div>

      <!-- Card -->
      <div class="card shadow-lg border-0" style="border-radius: 20px">
        <div class="card-body p-5">
          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- ================= BASIC INFO ================= -->
            <h4 class="mb-4" style="color: #c2185b">Basic Information</h4>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Bride Name</label>
                <input
                  type="text"
                  name="bride_name"
                  class="form-control"
                  style="border-radius: 10px"
                  value="{{ wedding.bride_name|default:'' }}"
                  required
                />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Groom Name</label>
                <input
                  type="text"
                  name="groom_name"
                  class="form-control"
                  style="border-radius: 10px"
                  value="{{ wedding.groom_name|default:'' }}"
                  required
                />
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Wedding Date</label>
                <input
                  type="date"
                  name="wedding_date"
                  class="form-control"
                  style="border-radius: 10px"
                  value="{{ wedding.wedding_date|date:'Y-m-d' }}"
                />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Location</label>
                <input
                  type="text"
                  name="location"
                  class="form-control"
                  style="border-radius: 10px"
                  value="{{ wedding.location|default:'' }}"
                />
              </div>
            </div>

            <hr class="my-4" />

            <!-- ================= STORY SECTION ================= -->
            <h4 class="mb-4" style="color: #c2185b">Our Love Story</h4>

            <div class="mb-3">
              <label class="form-label fw-bold">Our Story</label>
              <textarea
                name="story"
                class="form-control"
                rows="3"
                style="border-radius: 10px"
              >
{{ wedding.story|default:'' }}</textarea
              >
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Her Story</label>
              <textarea
                name="herStory"
                class="form-control"
                rows="3"
                style="border-radius: 10px"
              >
{{ wedding.herStory|default:'' }}</textarea
              >
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">His Story</label>
              <textarea
                name="hisStory"
                class="form-control"
                rows="3"
                style="border-radius: 10px"
              >
{{ wedding.hisStory|default:'' }}</textarea
              >
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">How We Met</label>
              <textarea
                name="how_we_met"
                class="form-control"
                rows="3"
                style="border-radius: 10px"
              >
{{ wedding.how_we_met|default:'' }}</textarea
              >
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">First Date</label>
              <textarea
                name="first_date"
                class="form-control"
                rows="3"
                style="border-radius: 10px"
              >
{{ wedding.first_date|default:'' }}</textarea
              >
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Proposal</label>
              <textarea
                name="proposal"
                class="form-control"
                rows="3"
                style="border-radius: 10px"
              >
{{ wedding.proposal|default:'' }}</textarea
              >
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Engagement</label>
              <textarea
                name="engagement"
                class="form-control"
                rows="3"
                style="border-radius: 10px"
              >
{{ wedding.engagement|default:'' }}</textarea
              >
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Marriage</label>
              <textarea
                name="marriage"
                class="form-control"
                rows="3"
                style="border-radius: 10px"
              >
{{ wedding.marriage|default:'' }}</textarea
              >
            </div>

            <hr class="my-4" />

            <!-- ================= IMAGES ================= -->
            <hr class="my-5" />

            <h4
              class="mb-4 text-center"
              style="color: #c2185b; font-weight: bold"
            >
              📸 Upload Wedding Images
            </h4>

            <div class="row g-4">
              <!-- Cover Image -->
              <div class="col-md-4">
                <div class="card shadow-sm p-3" style="border-radius: 15px">
                  <label class="form-label fw-bold">Cover Image</label>
                  <input
                    type="file"
                    name="CoverImage"
                    class="form-control"
                    style="border-radius: 10px"
                  />
                </div>
              </div>

              <!-- Her Image -->
              <div class="col-md-4">
                <div class="card shadow-sm p-3" style="border-radius: 15px">
                  <label class="form-label fw-bold">Her Image</label>
                  <input
                    type="file"
                    name="herImage"
                    class="form-control"
                    style="border-radius: 10px"
                  />
                </div>
              </div>

              <!-- His Image -->
              <div class="col-md-4">
                <div class="card shadow-sm p-3" style="border-radius: 15px">
                  <label class="form-label fw-bold">His Image</label>
                  <input
                    type="file"
                    name="hisImage"
                    class="form-control"
                    style="border-radius: 10px"
                  />
                </div>
              </div>

              <!-- Meet -->
              <div class="col-md-4">
                <div class="card shadow-sm p-3" style="border-radius: 15px">
                  <label class="form-label fw-bold">Meet Image</label>
                  <input
                    type="file"
                    name="meet"
                    class="form-control"
                    style="border-radius: 10px"
                  />
                </div>
              </div>

              <!-- Engagement -->
              <div class="col-md-4">
                <div class="card shadow-sm p-3" style="border-radius: 15px">
                  <label class="form-label fw-bold">Engagement Image</label>
                  <input
                    type="file"
                    name="engaement"
                    class="form-control"
                    style="border-radius: 10px"
                  />
                </div>
              </div>

              <!-- First Date -->
              <div class="col-md-4">
                <div class="card shadow-sm p-3" style="border-radius: 15px">
                  <label class="form-label fw-bold">First Date Image</label>
                  <input
                    type="file"
                    name="first_date"
                    class="form-control"
                    style="border-radius: 10px"
                  />
                </div>
              </div>

              <!-- Proposal -->
              <div class="col-md-4">
                <div class="card shadow-sm p-3" style="border-radius: 15px">
                  <label class="form-label fw-bold">Proposal Image</label>
                  <input
                    type="file"
                    name="proposal"
                    class="form-control"
                    style="border-radius: 10px"
                  />
                </div>
              </div>

              <!-- Marriage -->
              <div class="col-md-4">
                <div class="card shadow-sm p-3" style="border-radius: 15px">
                  <label class="form-label fw-bold">Marriage Image</label>
                  <input
                    type="file"
                    name="marriage"
                    class="form-control"
                    style="border-radius: 10px"
                  />
                </div>
              </div>
            </div>

            <hr class="my-5" />

            <h4
              class="mb-4 text-center"
              style="color: #c2185b; font-weight: bold"
            >
              🖼 Gallery Images
            </h4>

            <div class="row g-4">
              <div class="col-md-4">
                <input
                  type="file"
                  name="gallery1"
                  class="form-control"
                  style="border-radius: 10px"
                />
              </div>

              <div class="col-md-4">
                <input
                  type="file"
                  name="gallery2"
                  class="form-control"
                  style="border-radius: 10px"
                />
              </div>

              <div class="col-md-4">
                <input
                  type="file"
                  name="gallery3"
                  class="form-control"
                  style="border-radius: 10px"
                />
              </div>

              <div class="col-md-4">
                <input
                  type="file"
                  name="gallery4"
                  class="form-control"
                  style="border-radius: 10px"
                />
              </div>

              <div class="col-md-4">
                <input
                  type="file"
                  name="gallery5"
                  class="form-control"
                  style="border-radius: 10px"
                />
              </div>

              <div class="col-md-4">
                <input
                  type="file"
                  name="gallery6"
                  class="form-control"
                  style="border-radius: 10px"
                />
              </div>
            </div>

            <hr class="my-5" />

            <h4
              class="mb-4 text-center"
              style="color: #c2185b; font-weight: bold"
            >
              🎉 Add a Guest
            </h4>

            <div
              class="card shadow-sm p-4"
              style="
                border-radius: 20px;
                background-color: #fff0f5;
                max-width: 600px;
                margin: auto;
              "
            >
              <div class="mb-3">
                <label class="form-label fw-bold">Guest Name</label>
                <input
                  type="text"
                  name="guest_name"
                  class="form-control"
                  placeholder="Enter guest name"
                  style="border-radius: 10px"
                  value="{{ guest.guest_name|default:'' }}"
                  required
                />
              </div>
            </div>

            <!-- Submit Button -->
            <div class="text-center">
              <button
                type="submit"
                class="btn px-5 py-2"
                style="
                  background-color: #c2185b;
                  color: white;
                  border-radius: 30px;
                  font-weight: bold;
                "
              >
                {% if wedding %} 💾 Update Wedding {% else %} 💕 Create Wedding
                {% endif %}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
