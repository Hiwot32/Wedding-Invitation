<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ForeverLove</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body style="background: linear-gradient(to right, #f8f9fa, #ffe6f0)">
    <div class="container py-5">

     <a href="{% url 'rsvp_summary' %}" class="btn text-white px-4 py-2" style="border-radius: 25px; font-weight: bold; background-color: #d94b84">
    RSVP Responses
</a>


      <div class="text-center mb-5">
        <h1 style="font-family: cursive; color: #c2185b">
          💕 Couples Information
        </h1>
        <p class="text-muted">Create or Update Your Wedding Story</p>
      </div>

      <div class="card shadow-lg border-0" style="border-radius: 20px">
        <div class="card-body p-5">

          <form method="POST" action="{% url 'Info' %}" enctype="multipart/form-data">
            {% csrf_token %}

            <h4 class="mb-4" style="color: #c2185b">Basic Information</h4>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Bride Name</label>
                <input type="text" name="bride_name" class="form-control"
                required />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Groom Name</label>
                <input type="text" name="groom_name" class="form-control"
                required />
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Wedding Date</label>
                <input type="date" name="wedding_date" class="form-control"
                />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Location</label>
                <input type="text" name="location" class="form-control"
                />
              </div>
            </div>

            <hr class="my-4" />


            <div class="mb-3">
              <label class="form-label fw-bold">her Story</label>
              <textarea name="herStory" class="form-control" rows="3">
              </textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">His Story</label>
              <textarea name="hisStory" class="form-control" rows="3">
              </textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">How We Met</label>
              <textarea name="how_we_met" class="form-control" rows="3">
            </textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Date of First Meet</label>
              <input type="date" name="dateOfMeet" class="form-control"
              />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">First Date</label>
              <textarea name="first_date" class="form-control" rows="3">
              </textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Date of First Date</label>
              <input type="date" name="dateOfDate" class="form-control"
              />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Proposal</label>
              <textarea name="proposal" class="form-control" rows="3">
              </textarea>
            </div>

            
            <div class="mb-3">
              <label class="form-label fw-bold">Date of Proposal</label>
              <input type="date" name="dateOfProposal" class="form-control"
              />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Engagement</label>
              <textarea name="engagement" class="form-control" rows="3">
              </textarea>
            </div>

         
            <div class="mb-3">
              <label class="form-label fw-bold">Date of Engagement</label>
              <input type="date" name="dateOfEngagement" class="form-control"
              />
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Marriage</label>
              <textarea name="marriage" class="form-control" rows="3">
              </textarea>
            </div>

            <hr class="my-5" />

          
            <h4 class="mb-4 text-center" style="color:#c2185b;font-weight:bold;">
              📸 Upload Wedding Images
            </h4>

              <div class="col-md-4">
                <label class="fw-bold">Her Image</label>
                <input type="file" name="herImage" class="form-control" />
              </div>

              <div class="col-md-4">
                <label class="fw-bold">His Image</label>
                <input type="file" name="hisImage" class="form-control" />
              </div>

              <div class="col-md-4">
                <label class="fw-bold">Meet Image</label>
                <input type="file" name="meet" class="form-control" />
              </div>

              <div class="col-md-4">
                <label class="fw-bold">Engagement Image</label>
                <input type="file" name="engaement" class="form-control" />
              </div>

              <div class="col-md-4">
                <label class="fw-bold">First Date Image</label>
                <input type="file" name="first_date" class="form-control" />
              </div>

              <div class="col-md-4">
                <label class="fw-bold">Proposal Image</label>
                <input type="file" name="proposal" class="form-control" />
              </div>

              <div class="col-md-4">
                <label class="fw-bold">Wedding Image</label>
                <input type="file" name="marriage" class="form-control" />
              </div>
            </div>

            <hr class="my-5" />

            <h4 class="mb-4 text-center" style="color:#c2185b;font-weight:bold;">
              🖼 Gallery Images
            </h4>

            <div class="row g-4">
              <div class="col-md-4"><input type="file" name="gallery1" class="form-control" /></div>
              <div class="col-md-4"><input type="file" name="gallery2" class="form-control" /></div>
              <div class="col-md-4"><input type="file" name="gallery3" class="form-control" /></div>
              <div class="col-md-4"><input type="file" name="gallery4" class="form-control" /></div>
              <div class="col-md-4"><input type="file" name="gallery5" class="form-control" /></div>
              <div class="col-md-4"><input type="file" name="gallery6" class="form-control" /></div>
            </div>

            <hr class="my-5" />

            <h4 class="mb-3 text-center" style="color:#c2185b;">
              🎉 Guest List
            </h4>

            <div style="max-width:600px;margin:auto;">
              <label class="fw-bold">Guest Names (one per line)</label>
              <textarea name="guest_list" class="form-control" rows="5" required></textarea>
            </div>

            <hr class="my-5" />

            <div class="text-center d-flex justify-content-center gap-3">

              <button type="submit"
                class="btn px-5 py-2"
                style="background-color:#c2185b;color:white;border-radius:30px;font-weight:bold;">
                💕 Create Wedding
              </button>

              <a href="{% url 'edit_wedding' %}"
                class="btn px-5 py-2"
                style="background-color:#c2185b;color:white;border-radius:30px;font-weight:bold;">
                💾 Update Wedding
              </a>

              <a href="/"
                class="btn px-5 py-2"
                style="background-color:#6c757d;color:white;border-radius:30px;font-weight:bold;">
                ✏ Delete
              </a>

            </div>

          </form>

        </div>
      </div>
    </div>
  </body>
</html>
