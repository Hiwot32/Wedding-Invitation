<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ForeverLove</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
    rel="stylesheet">

    <style>
        body{
            padding:0;
            margin:0;
            font-family: 'Lora', serif;

        }
        .lists{
        gap:70px;
        }
        a{
            color:white;
            text-decoration: none;
            cursor:pointer;
        }
        a:hover{
            color:rgb(209,164,122);
        }
        .outerSection{
            background-image:url("https://www.madebydesignesia.com/themes/lovus/images/background/1.jpg");
            background-size:cover;

        }
        .her{

            padding:150px;
        }
        .orange{
            color:rgb(209,164,122);
            
        }
        .happy{
            font-size:70px; 

        }
        .him{
            background-image:url("https://www.madebydesignesia.com/themes/lovus/images/background/1.jpg");
            background-size:cover;
            padding:200px;
        }
                
        .footer{
            background-color:rgb(98,101,112)
        }
        .footer-div{
            background-color:rgb(89,92,102)
        }
    </style>
</head>

<body>
    <section>
    
    <section class="outerSection" >
    <header class="p-5">
        <section class="d-flex justify-content-between header">
            <div>
                <h2 class="orange">ForeverLove</h2>
            </div>
            <div>
                <ul class="lists fst-italic list-unstyled d-flex text-white fw-bold">
                    <a href="/">Home</a>
                    <a href={% url 'about' %}>About</a>
                    <a href={% url 'story' %}>Story</a>
                    <a href={% url 'gallery' %}>Gallery</a>
                    
                </ul>
            </div>
        </section>
       
    </header>
        <div class="her text-center">
            <p class="fs-2 text-white">{{weddings}} <br /><span class="orange happy fst-italic">Happy Bride</span></p>
        </div>
        </section>
        <div class="py-5">
            <p class="w-50 fs-5 mx-auto text-center">{{weddings.herStory}}</p>
        </div>
    

    </section>



    <section>

    <section>
         <div class="him text-center">
            <p class="fs-1 text-white">{{weddings.groom_name}} <br /><span class="orange happy fst-italic">Happy Groom</span></p>
        </div>
        <div class="py-5">
            <p class="w-50 fs-5 mx-auto text-center">{{weddings.hisStory}}</p>
        </div>
    </section>


    </section>

<footer class=" text-white footer text-center">
    <div class="p-5">
    <p class="py-4 fs-3">{{weddings.groom_name}} <span class="orange">&</span> {{weddings.bride_name}}</P>
    </div>
    <div class="text-center footer-div py-3">
        <p>&copy; Copyright 2026</P>
    </div>
</footer>
    



</body>
</html>
