<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForeverLove - Register</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Lora', serif;
      background: linear-gradient(135deg, #f8e8e8, #ffe1e1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .card {
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      padding: 40px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }
    
    h3 {
      font-weight: 700;
      color: #c2185b;
    }
    
    form input {
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      transition: border-color 0.3s;
    }
    
    form input:focus {
      border-color: #c2185b;
      box-shadow: 0 0 5px rgba(194,24,91,0.3);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #c2185b, #ff4081);
      border: none;
      font-weight: 600;
      padding: 12px;
      border-radius: 10px;
      transition: background 0.3s, transform 0.2s;
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, #ff4081, #c2185b);
      transform: translateY(-2px);
    }
    
    p {
      font-size: 0.9rem;
      color: #555;
    }
    
    p a {
      color: #c2185b;
      text-decoration: none;
      font-weight: 500;
    }
    
    p a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card">
          <h3 class="mb-4 text-center">Sign Up</h3>
          <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Create Account</button>
          </form>
          <p class="mt-4 text-center">
            Already have an account? <a href="{% url 'login' %}">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
