<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #f8f9fa, #ffe6f0);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-card {
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn-primary {
      background-color: #c2185b;
      border: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card login-card p-4">
          <h3 class="text-center mb-4" style="color: #c2185b;">💕 Login</h3>

          {% if form.errors %}
{% if form.errors|length > 1 %}
    {{ form.errors|length }} errors
{% else %}
    {{ form.errors|length }} error
{% endif %}
          {% endif %}

          <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Login</button>
          </form>

          <p class="mt-3 text-center">
            Don't have an account? <a href="{% url 'register' %}" style="color: #c2185b;">Register</a>
          </p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
