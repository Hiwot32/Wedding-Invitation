<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RSVP for {{ wedding.bride_name }} & {{ wedding.groom_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body style="background: linear-gradient(to right, #ffe6f0, #f8f9fa); min-height: 100vh;">
  <div class="container py-5">

    <div class="text-center mb-5">
      <h1 style="font-family: cursive; color: #c2185b">
        💌 RSVP for {{ wedding.bride_name }} & {{ wedding.groom_name }}
      </h1>
      <p class="text-muted">Wedding Date: {{ wedding.wedding_date|date:"F d, Y" }}</p>
    </div>

    <div class="card shadow-lg p-5" style="border-radius: 20px; max-width: 600px; margin: auto; background-color: #fff0f5;">
<form method="POST">
    {% csrf_token %}

    <!-- Guest Dropdown -->
    <div class="mb-4">
      <label class="form-label fw-bold">Select Your Name</label>
      <select name="guest_id" class="form-select" required>
        <option value="">-- Select Your Name --</option>
        {% for guest in guests %}
          <option value="{{ guest.id }}">{{ guest.guest_name }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Number of Guests -->
    <div class="mb-4">
      <label class="form-label fw-bold">Number of Guests</label>
      <input type="number" name="num_guests" class="form-control" min="1" value="1" required>
    </div>

    <!-- Attendance -->
    <div class="mb-4">
      <label class="form-label fw-bold">Will you attend?</label>
      <select name="attending" class="form-select" required>
        <option value="">-- Select --</option>
        <option value="yes">Yes, I will attend</option>
        <option value="no">No, I can't make it</option>
      </select>
    </div>

    <!-- Comment / Remarks -->
    <div class="mb-4">
      <label class="form-label fw-bold">Comments / Special Requests</label>
      <textarea name="comments" class="form-control" rows="3" placeholder="Leave a comment or any special request"></textarea>
    </div>

    <!-- Submit Button -->
    <div class="text-center">
      <button type="submit" class="btn px-5 py-2" style="background-color: #c2185b; color: white; border-radius: 30px; font-weight: bold;">
        Submit RSVP
      </button>
    </div>

</form>
    </div>

  </div>
</body>
</html>
